# ===== 宝塔面板 Docker Compose 生产配置 =====
# 方式一 (本地构建): docker compose -f docker-compose.prod.yml up -d --build
# 方式二 (拉镜像):   docker compose -f docker-compose.prod.yml up -d

services:
  api:
    image: ghcr.io/liaoweixiang2024-blip/3dparthub-api:latest
    build: ./server
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://modeluser:${DB_PASSWORD:-modelpass}@postgres:5432/3dparthub
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: uploads
      STATIC_DIR: static
      MAX_FILE_SIZE: 104857600
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads-data:/app/uploads
      - static-data:/app/static
      - /var/run/docker.sock:/var/run/docker.sock
      - project-data:/project
    restart: unless-stopped
    networks:
      - internal

  web:
    image: ghcr.io/liaoweixiang2024-blip/3dparthub-web:latest
    build: ./client
    ports:
      - "3780:80"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    # 不暴露端口到宿主机，仅内部访问（安全）
    environment:
      POSTGRES_DB: 3dparthub
      POSTGRES_USER: modeluser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-modelpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modeluser -d 3dparthub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    # 不暴露端口到宿主机，仅内部访问（安全）
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  uploads-data:
  static-data:
  project-data:

networks:
  internal:

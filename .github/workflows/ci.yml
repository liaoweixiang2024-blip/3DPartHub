name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Install scan tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Maintenance scans
        run: bash scripts/scan-maintenance.sh

      - name: Client verify
        working-directory: client
        run: npm run verify

      - name: Server verify
        working-directory: server
        run: npm run verify

      - name: Server test coverage
        working-directory: server
        run: npm run test:coverage

      - name: Client format check
        working-directory: client
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

      - name: Server format check
        working-directory: server
        run: npx prettier --check "src/**/*.ts"

      - name: Check pending Prisma migration
        working-directory: server
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --script > /dev/null

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Install scan tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Maintenance scans
        run: bash scripts/scan-maintenance.sh

      - name: Client verify
        working-directory: client
        run: npm run verify

      - name: Server verify
        working-directory: server
        run: npm run verify

      - name: Server test coverage
        working-directory: server
        run: npm run test:coverage

      - name: Client format check
        working-directory: client
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

      - name: Server format check
        working-directory: server
        run: npx prettier --check "src/**/*.ts"

      - name: Check pending Prisma migration
        working-directory: server
        env:
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/prisma_shadow
        run: |
          docker exec ${{ job.services.postgres.id }} createdb -U test prisma_shadow
          npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url "$SHADOW_DATABASE_URL" --exit-code

name: Build & Push Docker Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.0)'
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/3dparthub-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/3dparthub-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/3dparthub-web:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/3dparthub-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Tag

            `${{ steps.version.outputs.version }}`

            Tag description: 3DPartHub ${{ steps.version.outputs.version }} production release with schema alignment, CI hardening, backup progress polish, and Docker deployment metadata.

            ## Docker Images

            API image: `ghcr.io/${{ github.repository_owner }}/3dparthub-api:${{ steps.version.outputs.version }}`

            API image description: Express/Prisma API service with migrations, model conversion workers, backup/restore, audit logs, admin settings, queues, and background jobs.

            Web image: `ghcr.io/${{ github.repository_owner }}/3dparthub-web:${{ steps.version.outputs.version }}`

            Web image description: React/Vite frontend for 3D preview, product selection, inquiry/quote workflows, sharing, profile management, and admin pages.

            ```bash
            # Default deployment follows latest and uses Watchtower for api/web auto-updates.
            # Run this when you want to update immediately:
            cd /opt/3dparthub
            curl -L -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
            touch .env
            grep -q '^IMAGE_TAG=' .env && sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=latest/' .env || echo 'IMAGE_TAG=latest' >> .env
            docker compose pull
            docker compose up -d --force-recreate

            # Verify health
            curl http://localhost:3780/api/health
            ```

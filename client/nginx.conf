upstream api_backend {
    server api:8000;
    keepalive 256;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20g;

    # Connection optimizations
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_timeout 120s;
    client_header_timeout 30s;
    send_timeout 120s;
    reset_timedout_connection on;
    sendfile on;
    sendfile_max_chunk 2m;
    tcp_nopush on;
    tcp_nodelay on;

    # Hide nginx version
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_buffers 16 8k;

    # Open file cache for static assets
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;

    # API proxy — never cache dynamic API responses
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Available "1";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_request_buffering off;
        proxy_buffering on;
        proxy_buffers 8 16k;

        # Force browsers/CDNs to never cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Container health check endpoint.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Chunked upload — needs long timeout for merge and large chunk transfer
    location /api/upload/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Available "1";
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 500m;
    }

    # Backup import/export - longer timeouts
    location /api/settings/backup/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Available "1";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Authenticated downloads: API validates first, then nginx serves the file.
    location /_protected_static/ {
        internal;
        alias /app/static/;
        sendfile on;
        sendfile_max_chunk 2m;
        tcp_nopush on;
        aio threads;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "private, max-age=300" always;
    }

    location /_protected_uploads/ {
        internal;
        alias /app/uploads/;
        sendfile on;
        sendfile_max_chunk 2m;
        tcp_nopush on;
        aio threads;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "private, max-age=300" always;
    }

    # Never expose sensitive static subdirectories directly.
    location ~ ^/static/(backups|_backup_db|_safety_snapshots|html-previews|originals|ticket-attachments|drawings|batch|\.restore_[^/]*)(/|$) {
        return 404;
    }

    # Converted model assets may be gated by backend settings; route through API instead of nginx alias.
    location /static/models/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Available "1";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
    }

    # SVG can carry active content when opened directly; sandbox it even for public option images/logos.
    location ~* ^/static/(.+\.svg)$ {
        alias /app/static/$1;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src data:; style-src 'unsafe-inline'; sandbox" always;
    }

    # Public static files (converted previews, thumbnails, option images).
    location /static/ {
        alias /app/static/;
        try_files $uri =404;
        sendfile on;
        sendfile_max_chunk 2m;
        tcp_nopush on;
        aio threads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Uploads are served only through authenticated X-Accel redirects.
    location /uploads/ {
        return 404;
    }

    # Maintenance page — served when backend is down (502/503)
    location = /maintenance.html {
        internal;
        root /usr/share/nginx/html;
    }

    # Custom error pages for backend downtime
    error_page 502 503 /maintenance.html;

    # SPA fallback — never cache index.html so new bundles are always discovered
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets (JS/CSS bundles with hash) — serve pre-compressed
    location /assets/ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        gzip_static on;
    }

    # Font files
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 180d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

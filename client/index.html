<!doctype html>
<html class="dark" lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>3DPartHub</title>
    <meta name="description" content="" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="preload" href="/fonts/space-grotesk-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/space-grotesk-latin-600-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/space-grotesk-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:type" content="website" />
    <script>
      // Apply site config from localStorage before React hydrates to prevent flash
      (function() {
        try {
          var raw = localStorage.getItem('site_config_cache');
          if (!raw) return;
          var stored = JSON.parse(raw);
          var cfg = stored && stored.data;
          if (!cfg) return;
          var title = cfg.site_browser_title || cfg.site_title;
          if (title) {
            document.title = title;
            var ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.setAttribute('content', title);
          }
          var desc = cfg.site_description;
          if (desc) {
            var metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', desc);
            var ogDesc = document.querySelector('meta[property="og:description"]');
            if (ogDesc) ogDesc.setAttribute('content', desc);
          }
          if (cfg.site_favicon) {
            var link = document.querySelector('link[rel="icon"]');
            if (link) link.href = cfg.site_favicon;
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root" style="opacity:0"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#93C5FD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === 3D Cube Icon (left) === -->
  <g transform="translate(8, 4) scale(0.75)">
    <!-- Right face -->
    <polygon points="42,28 71,13 71,49 42,64" fill="url(#rightFace)"/>
    <!-- Left face -->
    <polygon points="42,28 13,13 13,49 42,64" fill="url(#leftFace)"/>
    <!-- Top face -->
    <polygon points="42,0 71,15 42,30 13,15" fill="url(#topFace)"/>

    <!-- Inner hex on top -->
    <polygon points="42,10 55,17 55,25 42,32 29,25 29,17" fill="#1E3A5F" opacity="0.2"/>

    <!-- Hub lines -->
    <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.45">
      <line x1="42" y1="21" x2="42" y2="12"/>
      <line x1="42" y1="21" x2="49.5" y2="17"/>
      <line x1="42" y1="21" x2="49.5" y2="25"/>
      <line x1="42" y1="21" x2="42" y2="30"/>
      <line x1="42" y1="21" x2="34.5" y2="25"/>
      <line x1="42" y1="21" x2="34.5" y2="17"/>
    </g>

    <!-- Hub center -->
    <circle cx="42" cy="21" r="12" fill="url(#hubGlow)"/>
    <circle cx="42" cy="21" r="4.5" fill="#fff" opacity="0.95"/>

    <!-- Node dots -->
    <g fill="#fff" opacity="0.55">
      <circle cx="42" cy="10" r="2.5"/>
      <circle cx="55" cy="17" r="2.5"/>
      <circle cx="55" cy="25" r="2.5"/>
      <circle cx="42" cy="32" r="2.5"/>
      <circle cx="29" cy="25" r="2.5"/>
      <circle cx="29" cy="17" r="2.5"/>
    </g>

    <!-- Left face grid -->
    <g stroke="#fff" stroke-width="0.8" opacity="0.07">
      <line x1="27.5" y1="28" x2="27.5" y2="56"/>
      <line x1="42" y1="36" x2="42" y2="64"/>
      <line x1="13" y1="31" x2="42" y2="46"/>
      <line x1="13" y1="49" x2="42" y2="64"/>
    </g>
    <!-- Right face grid -->
    <g stroke="#fff" stroke-width="0.8" opacity="0.07">
      <line x1="56.5" y1="28" x2="56.5" y2="56"/>
      <line x1="42" y1="36" x2="42" y2="64"/>
      <line x1="71" y1="31" x2="42" y2="46"/>
      <line x1="71" y1="49" x2="42" y2="64"/>
    </g>

    <!-- Edge highlights -->
    <line x1="42" y1="0" x2="13" y2="15" stroke="#93C5FD" stroke-width="1" opacity="0.35"/>
    <line x1="42" y1="0" x2="71" y2="15" stroke="#93C5FD" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- === Text "3DPartHub" === -->
  <text x="76" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="26" letter-spacing="-0.5">
    <tspan fill="#60A5FA">3D</tspan><tspan fill="#E2E8F0">Part</tspan><tspan fill="#38BDF8">Hub</tspan>
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#93C5FD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1E3A5F" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Main isometric cube -->
  <g filter="url(#shadow)">
    <!-- Right face -->
    <polygon points="128,136 220,88 220,200 128,248" fill="url(#rightFace)"/>
    <!-- Left face -->
    <polygon points="128,136 36,88 36,200 128,248" fill="url(#leftFace)"/>
    <!-- Top face -->
    <polygon points="128,24 220,72 128,120 36,72" fill="url(#topFace)"/>
  </g>

  <!-- Inner hexagonal cutout on top face -->
  <polygon points="128,52 168,72 168,104 128,124 88,104 88,72" fill="#1E3A5F" opacity="0.2"/>

  <!-- Hub connection lines radiating from center -->
  <g stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="128" y1="88" x2="128" y2="60"/>
    <line x1="128" y1="88" x2="152" y2="74"/>
    <line x1="128" y1="88" x2="152" y2="102"/>
    <line x1="128" y1="88" x2="128" y2="116"/>
    <line x1="128" y1="88" x2="104" y2="102"/>
    <line x1="128" y1="88" x2="104" y2="74"/>
  </g>

  <!-- Hub center glow -->
  <circle cx="128" cy="88" r="20" fill="url(#hubGlow)"/>

  <!-- Hub center dot -->
  <circle cx="128" cy="88" r="7" fill="#fff" opacity="0.95"/>

  <!-- Small node dots at hexagon vertices -->
  <g fill="#fff" opacity="0.6">
    <circle cx="128" cy="52" r="4"/>
    <circle cx="168" cy="72" r="4"/>
    <circle cx="168" cy="104" r="4"/>
    <circle cx="128" cy="124" r="4"/>
    <circle cx="88" cy="104" r="4"/>
    <circle cx="88" cy="72" r="4"/>
  </g>

  <!-- Left face subtle grid lines -->
  <g stroke="#fff" stroke-width="1" opacity="0.08">
    <line x1="82" y1="112" x2="82" y2="224"/>
    <line x1="128" y1="136" x2="128" y2="248"/>
    <line x1="36" y1="144" x2="128" y2="192"/>
    <line x1="36" y1="200" x2="128" y2="248"/>
  </g>

  <!-- Right face subtle grid lines -->
  <g stroke="#fff" stroke-width="1" opacity="0.08">
    <line x1="174" y1="112" x2="174" y2="224"/>
    <line x1="128" y1="136" x2="128" y2="248"/>
    <line x1="220" y1="144" x2="128" y2="192"/>
    <line x1="220" y1="200" x2="128" y2="248"/>
  </g>

  <!-- Edge highlights -->
  <line x1="128" y1="24" x2="36" y2="72" stroke="#93C5FD" stroke-width="1.5" opacity="0.4"/>
  <line x1="128" y1="24" x2="220" y2="72" stroke="#93C5FD" stroke-width="1.5" opacity="0.4"/>
  <line x1="36" y1="88" x2="36" y2="200" stroke="#60A5FA" stroke-width="1" opacity="0.2"/>
</svg>

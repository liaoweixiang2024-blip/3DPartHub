<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#93C5FD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Right face -->
  <polygon points="32,16 53,5 53,43 32,54" fill="url(#rightFace)"/>
  <!-- Left face -->
  <polygon points="32,16 11,5 11,43 32,54" fill="url(#leftFace)"/>
  <!-- Top face -->
  <polygon points="32,0 53,11 32,22 11,11" fill="url(#topFace)"/>

  <!-- Inner hex on top -->
  <polygon points="32,8 42,13 42,19 32,24 22,19 22,13" fill="#1E3A5F" opacity="0.2"/>

  <!-- Hub lines -->
  <g stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.45">
    <line x1="32" y1="16" x2="32" y2="9"/>
    <line x1="32" y1="16" x2="38" y2="13"/>
    <line x1="32" y1="16" x2="38" y2="19"/>
    <line x1="32" y1="16" x2="32" y2="23"/>
    <line x1="32" y1="16" x2="26" y2="19"/>
    <line x1="32" y1="16" x2="26" y2="13"/>
  </g>

  <!-- Hub center -->
  <circle cx="32" cy="16" r="8" fill="url(#hubGlow)"/>
  <circle cx="32" cy="16" r="3.5" fill="#fff" opacity="0.95"/>

  <!-- Node dots -->
  <g fill="#fff" opacity="0.55">
    <circle cx="32" cy="8" r="2"/>
    <circle cx="42" cy="13" r="2"/>
    <circle cx="42" cy="19" r="2"/>
    <circle cx="32" cy="24" r="2"/>
    <circle cx="22" cy="19" r="2"/>
    <circle cx="22" cy="13" r="2"/>
  </g>

  <!-- Left face grid -->
  <g stroke="#fff" stroke-width="0.5" opacity="0.07">
    <line x1="21.5" y1="24" x2="21.5" y2="48"/>
    <line x1="32" y1="30" x2="32" y2="54"/>
    <line x1="11" y1="27" x2="32" y2="38"/>
    <line x1="11" y1="43" x2="32" y2="54"/>
  </g>
  <!-- Right face grid -->
  <g stroke="#fff" stroke-width="0.5" opacity="0.07">
    <line x1="42.5" y1="24" x2="42.5" y2="48"/>
    <line x1="32" y1="30" x2="32" y2="54"/>
    <line x1="53" y1="27" x2="32" y2="38"/>
    <line x1="53" y1="43" x2="32" y2="54"/>
  </g>

  <!-- Edge highlights -->
  <line x1="32" y1="0" x2="11" y2="11" stroke="#93C5FD" stroke-width="0.8" opacity="0.35"/>
  <line x1="32" y1="0" x2="53" y2="11" stroke="#93C5FD" stroke-width="0.8" opacity="0.35"/>
</svg>

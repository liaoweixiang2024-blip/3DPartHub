# ============================================================
# 3DPartHub — 纯镜像一键部署配置
# ============================================================
#
# 【快速开始】
#   1. 安装 Docker + Docker Compose
#   2. 复制本文件到服务器，创建 .env 文件填写密钥（见下方）
#   3. docker compose up -d
#   4. 访问 http://服务器IP:3780
#
# 【升级版本】
#   1. 修改下方 IMAGE_TAG 为新版本号
#   2. docker compose pull && docker compose up -d
#   3. 检查日志: docker compose logs -f api
#      确认 prisma migrate deploy 成功，无报错
#   4. 检查健康: curl http://localhost:3780/api/health
#
# 【数据安全】
#   所有数据存储在 Docker 命名卷中，升级/重建容器不会丢失：
#     pgdata       — PostgreSQL 数据库
#     uploads-data — 上传的原始模型文件
#     static-data  — 转换后的模型、缩略图、备份文件
#
# 【备份恢复】
#   网页端: 设置 → 数据备份 → 服务器文件
#   命令行: docker cp backup.tar.gz 3dparthub-api:/app/static/backups/
#
# ============================================================

# <<< 修改版本号后执行 docker compose pull && docker compose up -d

services:
  api:
    image: ghcr.io/liaoweixiang2024-blip/3dparthub-api:latest
    container_name: 3dparthub-api
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    environment:
      TZ: Asia/Shanghai
      PORT: 8000
      DATABASE_URL: postgresql://modeluser:${DB_PASSWORD:-modelpass}@postgres:5432/3dparthub
      # <<< 必改: 使用随机字符串 (openssl rand -hex 32)
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret-string}
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: uploads
      STATIC_DIR: static
      MAX_FILE_SIZE: 104857600
      REDIS_URL: redis://redis:6379
      # <<< 可选: 允许的来源域名 (多个用逗号分隔)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # <<< 可选: 邮件通知 (注册验证码)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads-data:/app/uploads
      - static-data:/app/static
    restart: unless-stopped
    networks:
      - internal

  web:
    image: ghcr.io/liaoweixiang2024-blip/3dparthub-web:latest
    container_name: 3dparthub-web
    ports:
      - "${PORT:-3780}:80"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: 3dparthub-postgres
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    environment:
      POSTGRES_DB: 3dparthub
      POSTGRES_USER: modeluser
      # <<< 必改: 数据库密码 (与 DB_PASSWORD 一致)
      POSTGRES_PASSWORD: ${DB_PASSWORD:-modelpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modeluser -d 3dparthub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: 3dparthub-redis
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  uploads-data:
  static-data:

networks:
  internal:

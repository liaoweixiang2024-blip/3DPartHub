# ============================================================
# 3DPartHub — 历史纯镜像部署配置
# ============================================================
#
# 注意：
#   生产部署主入口以仓库根目录 docker-compose.yml 为准。
#   本文件只作为历史部署参考，避免同时维护两份不一致配置。
#
# 【快速开始】
#   1. 优先使用仓库根目录 docker-compose.yml
#   2. docker compose up -d
#      默认后台账号: admin / 3DPartHub@2026
#      首次登录后会强制修改密码
#   3. 访问 http://服务器IP:3780
#
#   更安全的方式：
#      创建 .env 文件填写随机密钥覆盖默认值
#      DB_PASSWORD="$(openssl rand -hex 24)"
#      JWT_SECRET="$(openssl rand -hex 32)"
#      ADMIN_PASS="$(openssl rand -base64 24)"
#      cat > .env <<EOF
#      DB_PASSWORD=${DB_PASSWORD}
#      JWT_SECRET=${JWT_SECRET}
#      ADMIN_PASS=${ADMIN_PASS}
#      EOF
#      docker compose up -d
#
# 【自动更新】
#   1. 默认使用 latest 镜像，Watchtower 每小时自动检查并更新 api/web 容器
#   2. 如需立即更新: docker compose pull && docker compose up -d --force-recreate
#   3. 如需锁定版本: 在 .env 中写入 IMAGE_TAG=v2.6.3
#   4. 检查日志: docker compose logs -f api
#      确认 prisma migrate deploy 成功，无报错
#   5. 检查健康: curl http://localhost:3780/api/health
#
# 【数据安全】
#   所有数据存储在 Docker 命名卷中，升级/重建容器不会丢失：
#     pgdata       — PostgreSQL 数据库
#     uploads-data — 上传的原始模型文件
#     static-data  — 转换后的模型、缩略图等运行文件
#   备份包单独映射到宿主机目录，方便人工拷贝和迁移：
#     ./server/static/backups -> /app/static/backups
#   backup-permissions 会在 api 启动前自动修复该目录权限
#
# 【备份恢复】
#   网页端: 设置 → 数据备份 → 服务器文件
#   命令行: cp backup.tar.gz ./server/static/backups/
#
# ============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# <<< 默认使用 latest；手动立即更新执行 docker compose pull && docker compose up -d --force-recreate

services:
  backup-permissions:
    image: ghcr.io/liaoweixiang2024-blip/3dparthub-api:${IMAGE_TAG:-latest}
    container_name: 3dparthub-backup-permissions
    user: "0:0"
    command:
      - sh
      - -c
      - mkdir -p /app/static/backups/.work && chown -R 1000:1000 /app/static/backups && chmod -R ug+rwX /app/static/backups
    volumes:
      - ./server/static/backups:/app/static/backups
    restart: "no"
    logging: *default-logging
    networks:
      - internal

  api:
    image: ghcr.io/liaoweixiang2024-blip/3dparthub-api:${IMAGE_TAG:-latest}
    container_name: 3dparthub-api
    init: true
    shm_size: ${API_SHM_SIZE:-1g}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: "postgresql://modeluser:${DB_PASSWORD:-3dparthub-default-db-password-change-me-2026}@postgres:5432/3dparthub?connection_limit=${DB_CONNECTION_LIMIT:-5}&pool_timeout=10"
      # <<< 建议在 .env 中覆盖为随机字符串 (openssl rand -hex 32)
      JWT_SECRET: "${JWT_SECRET:-3dparthub-default-jwt-secret-change-me-2026-04-30}"
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: uploads
      STATIC_DIR: static
      API_WORKERS: ${API_WORKERS:-2}
      CONVERSION_WORKER_CONCURRENCY: ${CONVERSION_WORKER_CONCURRENCY:-1}
      SLOW_REQUEST_LOG_BURST: ${SLOW_REQUEST_LOG_BURST:-5}
      SLOW_REQUEST_LOG_SAMPLE_RATE: ${SLOW_REQUEST_LOG_SAMPLE_RATE:-0.01}
      MAX_FILE_SIZE: 104857600
      REDIS_URL: redis://redis:6379
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@model.local}
      ADMIN_PASS: "${ADMIN_PASS:-3DPartHub@2026}"
      # <<< 可选: 允许的来源域名 (多个用逗号分隔)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # <<< 可选: 邮件通知 (注册验证码)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      backup-permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
      - static-data:/app/static
      - ./server/static/backups:/app/static/backups
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    stop_grace_period: 5m
    logging: *default-logging
    networks:
      - internal

  web:
    image: ghcr.io/liaoweixiang2024-blip/3dparthub-web:${IMAGE_TAG:-latest}
    container_name: 3dparthub-web
    init: true
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "${PORT:-3780}:80"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - static-data:/app/static:ro
      - uploads-data:/app/uploads:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    container_name: 3dparthub-watchtower
    command:
      - --label-enable
      - --cleanup
      - --rolling-restart
      - --include-restarting
      - --interval
      - "${WATCHTOWER_POLL_INTERVAL:-3600}"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: 3dparthub-postgres
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    environment:
      POSTGRES_DB: 3dparthub
      POSTGRES_USER: modeluser
      # <<< 建议在 .env 中覆盖为强密码，与 API 的 DB_PASSWORD 一致
      POSTGRES_PASSWORD: "${DB_PASSWORD:-3dparthub-default-db-password-change-me-2026}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modeluser -d 3dparthub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: 3dparthub-redis
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - ${REDIS_MAXMEMORY:-192mb}
      - --maxmemory-policy
      - noeviction
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

volumes:
  pgdata:
  uploads-data:
  static-data:
  redis-data:

networks:
  internal:
